<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGradient)" />
  
  <!-- Person silhouette -->
  <circle cx="200" cy="160" r="60" fill="url(#faceGradient)" />
  <path d="M 120 350 Q 200 280 280 350 L 280 380 Q 200 320 120 380 Z" fill="url(#faceGradient)" />
  
  <!-- Professional overlay -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" />
  
  <!-- Initials -->
  <text x="200" y="170" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.9">JN</text>
</svg>

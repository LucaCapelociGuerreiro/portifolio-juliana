#cloud-config
# Cloud-init script para Ubuntu 20.04 - Projeto Next.js Portfolio
# Este script instala e configura todas as dependências necessárias

package_update: true
package_upgrade: true

packages:
  - curl
  - wget
  - git
  - build-essential
  - nginx
  - ufw
  - htop
  - unzip
  - certbot
  - python3-certbot-nginx

runcmd:
  # Instalar Node.js 18.x (LTS)
  - curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
  - apt-get install -y nodejs
  
  # Verificar versões instaladas
  - node --version
  - npm --version
  
  # Criar usuário para a aplicação
  - useradd -m -s /bin/bash portfolio
  - usermod -aG sudo portfolio
  
  # Criar diretório para o projeto
  - mkdir -p /opt/portfolio
  - chown portfolio:portfolio /opt/portfolio
  
  # Clonar o repositório (substitua pela URL do seu repositório)
  # - git clone https://github.com/LucaCapelociGuerreiro/portifolio-juliana.git /opt/portfolio
  # - chown -R portfolio:portfolio /opt/portfolio
  
  # Configurar firewall
  - ufw allow ssh
  - ufw allow 80
  - ufw allow 443
  - ufw allow 3000
  - ufw --force enable
  
  # Configurar Nginx como proxy reverso para julianakaiza.site
  - |
    cat > /etc/nginx/sites-available/portfolio << 'EOF'
    server {
        listen 80;
        server_name julianakaiza.site www.julianakaiza.site;
        
        # Redirect HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name julianakaiza.site www.julianakaiza.site;
        
        # SSL Configuration (será configurado pelo Certbot)
        ssl_certificate /etc/letsencrypt/live/julianakaiza.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/julianakaiza.site/privkey.pem;
        
        # SSL Security Headers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        
        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
        
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Static files caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    EOF
  
  # Ativar site do Nginx
  - ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl reload nginx
  
  # Configurar SSL com Certbot (aguardar DNS propagar)
  - sleep 30
  - |
    # Criar configuração temporária sem SSL para validação inicial
    cat > /etc/nginx/sites-available/portfolio-temp << 'EOF'
    server {
        listen 80;
        server_name julianakaiza.site www.julianakaiza.site;
        
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }
        
        location / {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    EOF
  - rm -f /etc/nginx/sites-enabled/portfolio
  - ln -s /etc/nginx/sites-available/portfolio-temp /etc/nginx/sites-enabled/
  - nginx -t && systemctl reload nginx
  
  # Obter certificado SSL
  - certbot --nginx -d julianakaiza.site -d www.julianakaiza.site --non-interactive --agree-tos --email admin@julianakaiza.site --redirect
  
  # Restaurar configuração completa após SSL
  - rm -f /etc/nginx/sites-enabled/portfolio-temp
  - ln -s /etc/nginx/sites-available/portfolio /etc/nginx/sites-enabled/
  - nginx -t && systemctl reload nginx
  
  # Configurar renovação automática do SSL
  - systemctl enable certbot.timer
  - systemctl start certbot.timer
  
  # Criar script de deploy
  - |
    cat > /opt/portfolio/deploy.sh << 'EOF'
    #!/bin/bash
    set -e
    
    echo "Iniciando deploy do portfolio..."
    
    # Navegar para o diretório do projeto
    cd /opt/portfolio/portifolio/app
    
    # Instalar dependências
    echo "Instalando dependências..."
    npm ci --production
    
    # Build da aplicação
    echo "Fazendo build da aplicação..."
    npm run build
    
    # Parar processo anterior se existir
    pkill -f "npm run start" || true
    pkill -f "node.*next" || true
    
    # Aguardar um momento
    sleep 2
    
    # Iniciar aplicação em background
    echo "Iniciando aplicação..."
    nohup npm run start > /var/log/portfolio.log 2>&1 &
    
    echo "Deploy concluído! Aplicação rodando na porta 3000"
    EOF
  
  # Tornar script executável
  - chmod +x /opt/portfolio/deploy.sh
  - chown portfolio:portfolio /opt/portfolio/deploy.sh
  
  # Criar serviço systemd para a aplicação
  - |
    cat > /etc/systemd/system/portfolio.service << 'EOF'
    [Unit]
    Description=Portfolio Next.js Application
    After=network.target
    
    [Service]
    Type=simple
    User=portfolio
    WorkingDirectory=/opt/portfolio/portifolio/app
    ExecStart=/usr/bin/npm run start
    Restart=always
    RestartSec=10
    Environment=NODE_ENV=production
    Environment=PORT=3000
    
    [Install]
    WantedBy=multi-user.target
    EOF
  
  # Recarregar systemd
  - systemctl daemon-reload
  
  # Criar script de monitoramento
  - |
    cat > /opt/portfolio/monitor.sh << 'EOF'
    #!/bin/bash
    echo "=== Status do Sistema ==="
    echo "Uptime: $(uptime)"
    echo ""
    echo "=== Uso de Memória ==="
    free -h
    echo ""
    echo "=== Uso de Disco ==="
    df -h /
    echo ""
    echo "=== Status do Nginx ==="
    systemctl status nginx --no-pager -l
    echo ""
    echo "=== Status da Aplicação ==="
    systemctl status portfolio --no-pager -l
    echo ""
    echo "=== Logs da Aplicação (últimas 10 linhas) ==="
    tail -n 10 /var/log/portfolio.log 2>/dev/null || echo "Log não encontrado"
    EOF
  
  - chmod +x /opt/portfolio/monitor.sh
  - chown portfolio:portfolio /opt/portfolio/monitor.sh
  
  # Criar arquivo de instruções
  - |
    cat > /opt/portfolio/README-DEPLOY.md << 'EOF'
    # Instruções de Deploy - Portfolio Next.js
    
    ## Após a inicialização da instância:
    
    1. **Fazer upload do código:**
       ```bash
       # Opção 1: Via Git (recomendado)
       sudo -u portfolio git clone https://github.com/seu-usuario/portifolio-juliana.git /opt/portfolio/portifolio
       
       # Opção 2: Via SCP/SFTP
       # Faça upload dos arquivos para /opt/portfolio/portifolio/
       ```
    
    2. **Executar o deploy:**
       ```bash
       sudo -u portfolio /opt/portfolio/deploy.sh
       ```
    
    3. **Ou usar o serviço systemd:**
       ```bash
       sudo systemctl enable portfolio
       sudo systemctl start portfolio
       ```
    
    4. **Monitorar a aplicação:**
       ```bash
       /opt/portfolio/monitor.sh
       ```
    
    ## URLs de Acesso:
    - Aplicação: http://SEU_IP_PUBLICO
    - Logs: `tail -f /var/log/portfolio.log`
    
    ## Comandos Úteis:
    ```bash
    # Ver status
    sudo systemctl status portfolio
    
    # Reiniciar aplicação
    sudo systemctl restart portfolio
    
    # Ver logs em tempo real
    sudo journalctl -u portfolio -f
    
    # Verificar portas em uso
    sudo netstat -tlnp | grep :3000
    ```
    EOF
  
  - chown portfolio:portfolio /opt/portfolio/README-DEPLOY.md

write_files:
  - path: /etc/motd
    content: |
      ===============================================
      🚀 Servidor Portfolio Next.js - Ubuntu 20.04
      ===============================================
      
      📁 Diretório do projeto: /opt/portfolio
      📋 Instruções: /opt/portfolio/README-DEPLOY.md
      🔧 Deploy: /opt/portfolio/deploy.sh
      📊 Monitor: /opt/portfolio/monitor.sh
      
      🌐 Domínio: https://julianakaiza.site
      🔒 SSL: Configurado automaticamente
      
      Para fazer deploy:
      sudo -u portfolio /opt/portfolio/deploy.sh
      
      ⚠️  IMPORTANTE: Configure o DNS antes do deploy:
      - Tipo A: julianakaiza.site → SEU_IP_PUBLICO
      - Tipo A: www.julianakaiza.site → SEU_IP_PUBLICO
      
      ===============================================
    permissions: '0644'

final_message: |
  ✅ Servidor configurado com sucesso para julianakaiza.site!
  
  🔧 Próximos passos:
  1. Configure o DNS do domínio:
     - Tipo A: julianakaiza.site → SEU_IP_PUBLICO
     - Tipo A: www.julianakaiza.site → SEU_IP_PUBLICO
  
  2. Aguarde propagação DNS (5-30 minutos)
  
  3. Faça upload do código para /opt/portfolio/portifolio/
  
  4. Execute: sudo -u portfolio /opt/portfolio/deploy.sh
  
  5. Acesse: https://julianakaiza.site
  
  📋 Documentação completa: /opt/portfolio/README-DEPLOY.md
  🔒 SSL: Configurado automaticamente via Let's Encrypt
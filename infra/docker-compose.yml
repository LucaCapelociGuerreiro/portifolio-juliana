# ==============================================================================
# CONFIGURAÇÕES DE REDE
# ==============================================================================
networks:
  portfolio-network:
    driver: bridge

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  nginx-cache:
    driver: local
  app-cache:
    driver: local
# ==============================================================================
# DOCKER-COMPOSE COMPATÍVEL - ORACLE CLOUD FREE TIER
# ==============================================================================
# Configuração simplificada para compatibilidade com versões antigas do Docker Compose

version: '2.4'

services:
  app:
    build:
      context: ../app
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: portfolio-app
    mem_limit: 400m
    mem_reservation: 200m
    cpus: 0.5
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=256
      - PORT=3000
      - HOSTNAME=0.0.0.0
    ports:
      - "80:3000"     # << importante para testar no IP público
      # - "3000:3000" # (opcional) se quiser testar pela 3000 também
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - portfolio-network

